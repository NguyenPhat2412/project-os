name: frontend-ci

on:
  pull_request:
  push:
    branches: [main, master, feat/**]

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: npm
      - run: npm ci
      - run: npm run typecheck
      - run: npm run lint
      - run: npm run build
        env:
          PROJECT_OS_API_INTERNAL_URL: http://127.0.0.1:18080
